# Synthetic monitoring: homeowner quote flow + buyer checkout flow (no real payment).
# Runs every 30 min, on manual dispatch, and uploads results to the app for /status display.
name: Synthetic monitoring

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  SYNTHETIC_BASE_URL: ${{ vars.SYNTHETIC_BASE_URL || 'https://sunspire-web-app.vercel.app' }}
  SYNTHETIC_APP_URL: ${{ vars.SYNTHETIC_BASE_URL || 'https://sunspire-web-app.vercel.app' }}

jobs:
  synthetic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run homeowner synthetic
        id: homeowner-run
        run: npm run test:synthetic:homeowner
        env:
          SYNTHETIC_BASE_URL: ${{ env.SYNTHETIC_BASE_URL }}
        continue-on-error: true

      - name: Run buyer synthetic
        id: buyer-run
        run: npm run test:synthetic:buyer
        env:
          SYNTHETIC_BASE_URL: ${{ env.SYNTHETIC_BASE_URL }}
        continue-on-error: true

      - name: Upload artifacts on failure
        if: failure() || steps.homeowner-run.outcome == 'failure' || steps.buyer-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

      - name: Post synthetic results
        if: always() && !cancelled()
        env:
          SYNTHETIC_APP_URL: ${{ env.SYNTHETIC_APP_URL }}
          SYNTHETIC_HOMEOWNER_STATUS: ${{ steps.homeowner-run.outcome }}
          SYNTHETIC_BUYER_STATUS: ${{ steps.buyer-run.outcome }}
        run: node scripts/post-synthetic-results.mjs
